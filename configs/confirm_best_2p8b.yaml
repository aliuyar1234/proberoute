inherit_from: base.yaml

project:
  exp_id: CONFIRM_BEST_2P8B
  stage: confirm
  priority: should
  notes: "Best-effort confirmatory rerun of the main sparse probe-init method at 2.8B. Legacy exp_id retained for traceability; this is not a new baseline-selection step."

hardware:
  micro_batch_size: 1
  grad_accum: 64

data:
  tokenizer_name: EleutherAI/pythia-2.8b
  train_token_quota: 25000000
  val_token_quota: 2000000
  test_token_quota: 2000000

model:
  backbone_name: EleutherAI/pythia-2.8b
  layer_mix_mode: sparse_topm
  router_init_mode: probe_zscore_top5
  head_type: residual_mlp
  top_m: 4

train:
  eval_every_steps: 1000
  save_every_steps: 2000
