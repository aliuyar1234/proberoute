project:
  name: proberoute
  exp_id: SMOKE_LOCAL_TINY
  stage: smoke
  priority: must
  seed: 1337
  output_root: outputs
  notes: "Offline-only smoke harness using local fixture data, local toy tokenizer, and local toy backbone."

hardware:
  device: cpu
  precision: fp32
  expected_vram_gb: 0
  allow_flash_attn: false
  micro_batch_size: 4
  grad_accum: 1

data:
  dataset_name: local_fixture_text
  dataset_config: tiny_v1
  local_path: fixtures/tiny_corpus.jsonl
  tokenizer_name: local_toy_whitespace
  text_field_priority: [text]
  split_modulus: 1000
  split_ranges:
    train: [40, 999]
    val: [20, 39]
    test: [0, 19]
  seq_len: 32
  train_token_quota: 2048
  val_token_quota: 512
  test_token_quota: 512
  processed_root: outputs/data/processed
  append_eos_between_docs: true
  drop_last_sequence: true

model:
  backbone_name: local_toy_gpt
  freeze_backbone: true
  horizons: [1, 2, 3, 4]
  layer_mix_mode: sparse_topm
  router_init_mode: random
  probe_init_metric: top5
  head_type: residual_mlp
  top_m: 2
  router_temperature: 0.5
  probe_rank: 8
  hidden_expansion: 2
  hidden_norm: stateless_layer_norm
  entropy_penalty_beta: 0.001
  use_deephead_for_far_horizons: false
  deephead_horizons: [3, 4]

train:
  optimizer: adamw
  stop_mode: token_budget
  lr_head: 0.001
  lr_router: 0.001
  lr_probe: 0.001
  weight_decay: 0.0
  warmup_ratio: 0.0
  max_steps: null
  eval_every_steps: 1
  save_every_steps: 5
  log_every_steps: 1
  early_stop_patience: 10
  grad_clip_norm: 1.0
  loss_weights:
    "1": 1.0
    "2": 1.0
    "3": 1.0
    "4": 1.0
  loss_warmup:
    enabled: false
    full_weight_fraction_by_horizon:
      "2": 0.10
      "3": 0.20
      "4": 0.30

eval:
  future_metrics_sequence_count: 16
  acceptance_prefix_count: 8
  acceptance_prefix_len: 16
  acceptance_max_new_tokens: 8
  bootstrap_samples: 100
  bootstrap_seed: 2026
