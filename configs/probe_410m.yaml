inherit_from: base.yaml

project:
  exp_id: PROBE_410M
  stage: probe
  priority: must
  notes: "Mandatory 410M probe run for heatmaps and probe-init artefacts."

hardware:
  micro_batch_size: 4
  grad_accum: 16

data:
  tokenizer_name: EleutherAI/pythia-410m
  seq_len: 1024
  train_token_quota: 5000000
  val_token_quota: 1000000
  test_token_quota: 1000000

model:
  backbone_name: EleutherAI/pythia-410m
  layer_mix_mode: sparse_topm
  router_init_mode: none

train:
  eval_every_steps: 250
  save_every_steps: 500
