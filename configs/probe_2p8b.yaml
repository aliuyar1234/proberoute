inherit_from: base.yaml

project:
  exp_id: PROBE_2P8B
  stage: confirm
  priority: should
  notes: "Optional 2.8B probe prerequisite. Run only if the 2.8B confirmatory path is selected."

hardware:
  micro_batch_size: 1
  grad_accum: 64

data:
  tokenizer_name: EleutherAI/pythia-2.8b
  seq_len: 1024
  train_token_quota: 5000000
  val_token_quota: 1000000
  test_token_quota: 1000000

model:
  backbone_name: EleutherAI/pythia-2.8b
  layer_mix_mode: sparse_topm
  router_init_mode: none

train:
  eval_every_steps: 250
  save_every_steps: 500
